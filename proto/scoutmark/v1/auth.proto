syntax = "proto3";

package scoutmark.v1;

option go_package = "github.com/allyjweir/scoutmark/gen/go/scoutmark/v1;scoutmarkv1";

import "scoutmark/v1/types.proto";

// ─── Auth Service ──────────────────────────────────────────────────

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string session_token = 1;
  User user = 2;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message LogoutRequest {}

message LogoutResponse {}
