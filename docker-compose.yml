version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scoutmark
      POSTGRES_PASSWORD: scoutmark
      POSTGRES_DB: scoutmark
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver

volumes:
  pg_data:
