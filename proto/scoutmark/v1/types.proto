syntax = "proto3";

package scoutmark.v1;

option go_package = "github.com/allyjweir/scoutmark/gen/go/scoutmark/v1;scoutmarkv1";

import "google/protobuf/timestamp.proto";

// ─── Domain Messages ───────────────────────────────────────────────

message Event {
  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Timestamp created_at = 4;
}

message Patrol {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message UserPatrol {
  string patrol_id = 1;
  string patrol_name = 2;
  int32 sort_order = 3;
}

message CriteriaTemplate {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated Criterion criteria = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Criterion {
  string id = 1;
  string template_id = 2;
  string title = 3;
  string description = 4;
  int32 min_value = 5;
  int32 max_value = 6;
  int32 sort_order = 7;
}

message Session {
  string id = 1;
  string event_id = 2;
  string template_id = 3;
  string name = 4;
  google.protobuf.Timestamp starts_at = 5;
  google.protobuf.Timestamp ends_at = 6;
  SessionStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  // Populated when fetching full session details
  CriteriaTemplate template = 9;
  Event event = 10;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_UPCOMING = 1;
  SESSION_STATUS_ACTIVE = 2;
  SESSION_STATUS_CLOSED = 3;
}

message Draft {
  string id = 1;
  string user_id = 2;
  string session_id = 3;
  string patrol_id = 4;
  repeated DraftScore scores = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message DraftScore {
  string criterion_id = 1;
  int32 value = 2;
}

message Submission {
  string id = 1;
  string user_id = 2;
  string session_id = 3;
  string patrol_id = 4;
  repeated SubmissionScore scores = 5;
  bool locked = 6;
  google.protobuf.Timestamp submitted_at = 7;
}

message SubmissionScore {
  string criterion_id = 1;
  int32 value = 2;
}

message User {
  string id = 1;
  string username = 2;
  string display_name = 3;
  bool is_admin = 4;
}
