# Scoutmark BA subcamp/patrol source-of-truth.
#
# Intended use:
# - Import command treats this file as the full replacement set for subcamps + patrols.
# - Users are preserved; keep subcamp IDs stable to avoid breaking user assignments.
# - Patrol IDs should also stay stable once in use.
#
# ID rules:
# - lowercase letters, numbers, and hyphens only
# - prefer prefixes: sub-... and pat-...
#
# Example naming:
# - sub-morrison
# - pat-morrison-1

